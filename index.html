<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="星星魔法學院" />
  <title>星星魔法學院</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCk169Vb2o2hVSMc1KlwY7XbU3L0ld8R7s",
      authDomain: "star-points-6274e.firebaseapp.com",
      databaseURL: "https://star-points-6274e-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "star-points-6274e",
      storageBucket: "star-points-6274e.firebasestorage.app",
      messagingSenderId: "994815410563",
      appId: "1:994815410563:web:8d9c34b8b69d7c926b76b6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const AVATARS = ["🐰","🐻","🦊","🐼","🐸","🦁","🐯","🐨","🐹","🦄","🐙","🦋"];
    const EMOJIS = ["🎁","⌚","☕","🍕","🎬","🏖️","🎮","📱","👟","🎵","🍰","✈️","🛍️","💐","🏆"];
    const ADD_REASONS = ["主動分享","完成功課","幫忙做家事","保持禮貌","收拾玩具","早睡早起","勇敢嘗試"];
    const REMOVE_REASONS = ["講不禮貌的話","沒有收拾","發脾氣","不聽話","打人/咬人"];

    let state = {
      members: {},
      rewards: {},
      history: [],
      tab: "board",
      manageSection: "members",
      modal: null,
      starAmount: 1,
      customReason: "",
      newName: "",
      newAvatar: "🐹",
      newRewardName: "",
      newRewardCost: "",
      newRewardEmoji: "🎁",
      editingReward: null,
      toast: null,
      toastTimer: null,
    };

    // ── Firebase listeners ──
    onValue(ref(db, "members"), snap => {
      state.members = snap.val() || {};
      render();
    });
    onValue(ref(db, "rewards"), snap => {
      state.rewards = snap.val() || {};
      render();
    });
    onValue(ref(db, "history"), snap => {
      state.history = snap.val() || [];
      render();
    });

    // ── Helpers ──
    function showToast(msg) {
      clearTimeout(state.toastTimer);
      state.toast = msg;
      state.toastTimer = setTimeout(() => { state.toast = null; render(); }, 2200);
      render();
    }

    function getRank(stars) {
      if (stars >= 100) return { label: "⭐ 超級巨星", color: "#fbbf24" };
      if (stars >= 50)  return { label: "🌟 閃亮明星", color: "#f472b6" };
      if (stars >= 20)  return { label: "✨ 小小明星", color: "#34d399" };
      if (stars >= 5)   return { label: "💫 新星出發", color: "#818cf8" };
      return { label: "🌱 小小新生", color: "#94a3b8" };
    }

    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

    function saveHistory(entry) {
      const arr = [entry, ...state.history].slice(0, 30);
      set(ref(db, "history"), arr);
    }

    // ── Actions ──
    function openModal(memberId, type) {
      state.modal = { memberId, type };
      state.starAmount = 1;
      state.customReason = "";
      render();
    }

    function confirmChange(reason) {
      const { memberId, type } = state.modal;
      const member = state.members[memberId];
      if (!member) { state.modal = null; render(); return; }
      const amount = Math.max(1, state.starAmount);
      const now = new Date().toLocaleTimeString("zh-TW");

      if (type === "add") {
        update(ref(db, `members/${memberId}`), { stars: (member.stars || 0) + amount });
        saveHistory({ time: now, name: member.name, action: `得到 ${amount} 顆星：${reason}`, type: "add" });
        burst();
      } else {
        const actual = Math.min(amount, member.stars || 0);
        if (actual <= 0) { state.modal = null; render(); return; }
        update(ref(db, `members/${memberId}`), { stars: (member.stars || 0) - actual });
        saveHistory({ time: now, name: member.name, action: `扣 ${actual} 顆星：${reason}`, type: "remove" });
      }
      state.modal = null;
      render();
    }

    function redeemReward(memberId, rewardId) {
      const m = state.members[memberId];
      const r = state.rewards[rewardId];
      if (!m || !r) return;
      if ((m.stars || 0) < r.cost) { showToast("⭐ 星星不夠喔！繼續加油！"); return; }
      update(ref(db, `members/${memberId}`), { stars: (m.stars || 0) - r.cost });
      saveHistory({ time: new Date().toLocaleTimeString("zh-TW"), name: m.name, action: `換到了 ${r.emoji} ${r.name}！`, type: "redeem" });
      showToast(`🎉 ${m.avatar} ${m.name} 換到 ${r.emoji} ${r.name}！`);
    }

    function addMember() {
      if (!state.newName.trim()) return;
      const id = uid();
      set(ref(db, `members/${id}`), { name: state.newName.trim(), stars: 0, avatar: state.newAvatar });
      state.newName = "";
      render();
    }

    function removeMember(id) {
      set(ref(db, `members/${id}`), null);
    }

    function addReward() {
      if (!state.newRewardName.trim() || !state.newRewardCost) return;
      const cost = parseInt(state.newRewardCost);
      if (isNaN(cost) || cost <= 0) { showToast("請輸入正確的星星數量！"); return; }
      const id = uid();
      set(ref(db, `rewards/${id}`), { name: state.newRewardName.trim(), cost, emoji: state.newRewardEmoji });
      state.newRewardName = ""; state.newRewardCost = ""; state.newRewardEmoji = "🎁";
      showToast("✅ 新獎勵加好了！");
    }

    function removeReward(id) { set(ref(db, `rewards/${id}`), null); }

    function saveEditReward() {
      const r = state.editingReward;
      if (!r || !r.name.trim()) return;
      const cost = parseInt(r.cost);
      if (isNaN(cost) || cost <= 0) return;
      update(ref(db, `rewards/${r.id}`), { name: r.name.trim(), cost, emoji: r.emoji });
      state.editingReward = null;
      showToast("✅ 獎勵更新好了！");
    }

    // ── Burst animation ──
    function burst() {
      const el = document.getElementById("burst-container");
      if (!el) return;
      const cx = window.innerWidth / 2, cy = window.innerHeight / 3;
      for (let i = 0; i < 12; i++) {
        const span = document.createElement("span");
        const angle = (i / 12) * 360;
        const dist = 50 + Math.random() * 40;
        const rad = angle * Math.PI / 180;
        const dx = Math.cos(rad) * dist, dy = Math.sin(rad) * dist;
        const emojis = ["⭐","✨","💫","🌟"];
        span.textContent = emojis[Math.floor(Math.random() * 4)];
        span.style.cssText = `position:fixed;left:${cx}px;top:${cy}px;font-size:${14+Math.random()*10}px;pointer-events:none;z-index:9999;animation:burst 0.7s ease-out forwards;--dx:${dx}px;--dy:${dy}px;`;
        document.body.appendChild(span);
        setTimeout(() => span.remove(), 700);
      }
    }

    // ── Render ──
    function render() {
      const root = document.getElementById("root");
      const s = state;
      const members = Object.entries(s.members).map(([id, m]) => ({ ...m, id }));
      const rewards = Object.entries(s.rewards).map(([id, r]) => ({ ...r, id }));
      const sorted = [...members].sort((a, b) => (b.stars || 0) - (a.stars || 0));
      const totalStars = members.reduce((acc, m) => acc + (m.stars || 0), 0);

      root.innerHTML = `
        <div class="content" style="max-width:480px;margin:0 auto;padding:28px 16px 100px;">

          <!-- Header -->
          <div style="text-align:center;margin-bottom:32px;">
            <div style="font-size:64px;animation:float 3s ease-in-out infinite;display:inline-block;">🌟</div>
            <h1 style="font-size:28px;font-weight:900;margin-top:8px;background:linear-gradient(135deg,#fbbf24,#f472b6,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px;">星星魔法學院</h1>
            <p style="color:#a78bfa;font-size:14px;margin-top:6px;font-weight:700;">收集星星，解鎖神奇獎勵！✨</p>
            <div style="display:flex;justify-content:center;gap:12px;margin-top:12px;flex-wrap:wrap;">
              <div class="badge">👥 ${members.length} 位學員</div>
              <div class="badge">⭐ ${totalStars} 顆星</div>
              <div class="badge" style="color:#34d399;">🔴 即時同步中</div>
            </div>
          </div>

          <!-- Tabs -->
          <div style="display:flex;gap:6px;margin-bottom:24px;background:#1e0a3c;border-radius:20px;padding:6px;border:2px solid #3b1f6a;">
            ${[["board","🏆","排行榜"],["rewards","🎁","換獎勵"],["manage","⚙️","管理"]].map(([key,icon,label]) => `
              <button onclick="setTab('${key}')" class="tab-btn ${s.tab===key?'tab-active':''}">${icon} ${label}</button>
            `).join("")}
          </div>

          <!-- Board -->
          ${s.tab === "board" ? `
            <div class="fade-in">
              ${sorted.map((m, i) => {
                const rank = getRank(m.stars || 0);
                const medals = ["🥇","🥈","🥉"];
                return `
                  <div class="member-card" style="background:${i===0?"linear-gradient(135deg,#2d1260,#4c1d95)":"#1a0a3c"};border:2px solid ${i===0?"#7c3aed":"#2d1b5e"};box-shadow:${i===0?"0 0 32px rgba(124,58,237,0.3)":"none"};">
                    <div style="font-size:${i<3?28:16}px;font-weight:900;width:32px;text-align:center;color:#fbbf24;">${i<3?medals[i]:i+1}</div>
                    <div style="width:56px;height:56px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#4c1d95,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:30px;border:3px solid #6d28d9;animation:${i===0?"float 2.5s ease-in-out infinite":"none"};">${m.avatar}</div>
                    <div style="flex:1;min-width:0;">
                      <div style="font-weight:900;font-size:18px;color:#f8f0ff;">${m.name}</div>
                      <div style="font-size:12px;color:${rank.color};font-weight:800;margin-top:2px;">${rank.label}</div>
                      <div style="margin-top:6px;height:6px;border-radius:3px;background:#2d1b5e;overflow:hidden;">
                        <div style="height:100%;border-radius:3px;background:linear-gradient(90deg,#7c3aed,#f472b6);width:${Math.min(((m.stars||0)/150)*100,100)}%;transition:width 0.5s;"></div>
                      </div>
                    </div>
                    <div style="text-align:center;margin-right:4px;">
                      <div style="font-size:26px;font-weight:900;background:linear-gradient(135deg,#fbbf24,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">${m.stars||0}</div>
                      <div style="font-size:11px;color:#6b46c1;font-weight:700;">顆星</div>
                    </div>
                    <div style="display:flex;flex-direction:column;gap:6px;">
                      <button class="star-btn" onclick="openModal('${m.id}','add')">⭐</button>
                      <button class="minus-btn" onclick="openModal('${m.id}','remove')">−</button>
                    </div>
                  </div>
                `;
              }).join("")}

              ${s.history.length > 0 ? `
                <div style="margin-top:24px;background:#1a0a3c;border-radius:20px;padding:16px;border:2px solid #2d1b5e;">
                  <div style="color:#a78bfa;font-size:13px;font-weight:800;margin-bottom:12px;">📋 最近紀錄</div>
                  ${s.history.slice(0,8).map((h,i) => `
                    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:${i<7?"1px solid #2d1b5e":"none"};font-size:13px;gap:8px;">
                      <span style="display:flex;align-items:center;gap:6px;min-width:0;overflow:hidden;">
                        <span>${h.type==="remove"?"🔻":h.type==="redeem"?"🎁":"⭐"}</span>
                        <span style="color:#f472b6;font-weight:800;flex-shrink:0;">${h.name}</span>
                        <span style="color:${h.type==="remove"?"#fb7185":"#c4b5fd"};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${h.action}</span>
                      </span>
                      <span style="color:#4c1d95;font-size:12px;flex-shrink:0;">${h.time}</span>
                    </div>
                  `).join("")}
                </div>
              ` : ""}
            </div>
          ` : ""}

          <!-- Rewards -->
          ${s.tab === "rewards" ? `
            <div class="fade-in">
              ${rewards.length === 0 ? `
                <div style="text-align:center;color:#4c1d95;padding:48px;background:#1a0a3c;border-radius:24px;border:2px solid #2d1b5e;">
                  <div style="font-size:48px;margin-bottom:12px;">🎁</div>
                  <div style="font-weight:800;color:#6b46c1;">還沒有獎勵喔！</div>
                  <div style="font-size:13px;margin-top:4px;color:#4c1d95;">去「管理」頁面新增獎勵</div>
                </div>
              ` : rewards.map(r => `
                <div style="background:linear-gradient(135deg,#1e0a3c,#2d1260);border-radius:24px;padding:20px;margin-bottom:14px;border:2px solid #4c1d95;box-shadow:0 8px 32px rgba(76,29,149,0.3);">
                  <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px;">
                    <div style="width:64px;height:64px;border-radius:20px;font-size:36px;background:linear-gradient(135deg,#4c1d95,#7c3aed);display:flex;align-items:center;justify-content:center;animation:float 3s ease-in-out infinite;">${r.emoji}</div>
                    <div>
                      <div style="font-weight:900;font-size:20px;color:#f8f0ff;">${r.name}</div>
                      <div style="margin-top:4px;font-weight:900;font-size:22px;background:linear-gradient(135deg,#fbbf24,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">⭐ ${r.cost} <span style="font-size:13px;color:#6b46c1;-webkit-text-fill-color:#6b46c1;">顆星</span></div>
                    </div>
                  </div>
                  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                    ${members.map(m => {
                      const can = (m.stars||0) >= r.cost;
                      return `<button onclick="redeemReward('${m.id}','${r.id}')" style="padding:10px 8px;border-radius:14px;border:2px solid ${can?"#7c3aed":"#2d1b5e"};cursor:pointer;background:${can?"linear-gradient(135deg,#3b1f6a,#4c1d95)":"#12052a"};color:${can?"#f8f0ff":"#3b1f6a"};font-weight:800;font-size:13px;font-family:Nunito,sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;">
                        <span style="font-size:18px;">${m.avatar}</span>
                        <div style="text-align:left;"><div style="font-size:12px;">${m.name}</div><div style="font-size:11px;color:${can?"#fbbf24":"#3b1f6a"};">${m.stars||0}⭐</div></div>
                      </button>`;
                    }).join("")}
                  </div>
                </div>
              `).join("")}
            </div>
          ` : ""}

          <!-- Manage -->
          ${s.tab === "manage" ? `
            <div class="fade-in">
              <div style="display:flex;gap:8px;margin-bottom:20px;background:#1a0a3c;border-radius:16px;padding:6px;border:2px solid #2d1b5e;">
                <button onclick="setManageSection('members')" class="sub-tab ${s.manageSection==='members'?'sub-active':''}">👥 學員</button>
                <button onclick="setManageSection('rewards')" class="sub-tab ${s.manageSection==='rewards'?'sub-active':''}">🎁 獎勵</button>
              </div>

              ${s.manageSection === "members" ? `
                <div style="background:#1a0a3c;border-radius:20px;padding:16px;margin-bottom:16px;border:2px solid #2d1b5e;">
                  <div style="font-weight:800;color:#a78bfa;font-size:13px;margin-bottom:12px;">➕ 新增學員</div>
                  <div style="margin-bottom:10px;">
                    <div style="font-size:12px;color:#6b46c1;font-weight:700;margin-bottom:8px;">選動物頭像</div>
                    <div style="display:flex;flex-wrap:wrap;gap:6px;">
                      ${AVATARS.map(a => `<button onclick="selectAvatar('${a}')" style="width:40px;height:40px;border-radius:12px;border:${s.newAvatar===a?"3px solid #a855f7":"2px solid #2d1b5e"};background:${s.newAvatar===a?"#3b1f6a":"transparent"};font-size:22px;cursor:pointer;">${a}</button>`).join("")}
                    </div>
                  </div>
                  <div style="display:flex;gap:8px;">
                    <input id="newMemberName" value="${s.newName}" oninput="state.newName=this.value" onkeydown="if(event.key==='Enter')addMember()" placeholder="學員名字…" class="input-field" style="flex:1;" />
                    <button onclick="addMember()" class="btn-primary">新增</button>
                  </div>
                </div>
                ${members.map(m => `
                  <div style="background:#1a0a3c;border-radius:18px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;border:2px solid #2d1b5e;">
                    <div style="font-size:32px;">${m.avatar}</div>
                    <div style="flex:1;"><div style="font-weight:800;font-size:16px;">${m.name}</div><div style="font-size:13px;color:#fbbf24;font-weight:700;">⭐ ${m.stars||0} 顆星</div></div>
                    <button onclick="removeMember('${m.id}')" class="btn-ghost">移除</button>
                  </div>
                `).join("")}
              ` : ""}

              ${s.manageSection === "rewards" ? `
                <div style="background:#1a0a3c;border-radius:20px;padding:16px;margin-bottom:16px;border:2px solid #2d1b5e;">
                  <div style="font-weight:800;color:#a78bfa;font-size:13px;margin-bottom:12px;">➕ 新增獎勵</div>
                  <div style="font-size:12px;color:#6b46c1;font-weight:700;margin-bottom:8px;">選圖示</div>
                  <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;">
                    ${EMOJIS.map(e => `<button onclick="selectRewardEmoji('${e}')" style="width:38px;height:38px;border-radius:10px;border:${s.newRewardEmoji===e?"3px solid #a855f7":"2px solid #2d1b5e"};background:${s.newRewardEmoji===e?"#3b1f6a":"transparent"};font-size:20px;cursor:pointer;">${e}</button>`).join("")}
                  </div>
                  <div style="display:flex;gap:8px;margin-bottom:10px;">
                    <input id="newRewardName" value="${s.newRewardName}" oninput="state.newRewardName=this.value" placeholder="獎勵名稱…" class="input-field" style="flex:2;" />
                    <input id="newRewardCost" value="${s.newRewardCost}" oninput="state.newRewardCost=this.value" type="number" min="1" placeholder="星星數" class="input-field" style="flex:1;" />
                  </div>
                  <button onclick="addReward()" class="btn-primary" style="width:100%;">新增獎勵 🎁</button>
                </div>
                ${rewards.map(r => s.editingReward?.id === r.id ? `
                  <div style="background:#1a0a3c;border-radius:18px;padding:16px;margin-bottom:10px;border:2px solid #7c3aed;">
                    <div style="font-size:12px;color:#6b46c1;font-weight:700;margin-bottom:8px;">選圖示</div>
                    <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;">
                      ${EMOJIS.map(e => `<button onclick="setEditEmoji('${e}')" style="width:34px;height:34px;border-radius:9px;border:${s.editingReward.emoji===e?"3px solid #a855f7":"2px solid #2d1b5e"};background:${s.editingReward.emoji===e?"#3b1f6a":"transparent"};font-size:18px;cursor:pointer;">${e}</button>`).join("")}
                    </div>
                    <div style="display:flex;gap:8px;margin-bottom:10px;">
                      <input value="${s.editingReward.name}" oninput="state.editingReward.name=this.value" class="input-field" style="flex:2;" />
                      <input value="${s.editingReward.cost}" oninput="state.editingReward.cost=this.value" type="number" class="input-field" style="flex:1;" />
                    </div>
                    <div style="display:flex;gap:8px;">
                      <button onclick="saveEditReward()" class="btn-primary" style="flex:1;">儲存</button>
                      <button onclick="state.editingReward=null;render()" class="btn-ghost" style="flex:1;">取消</button>
                    </div>
                  </div>
                ` : `
                  <div style="background:#1a0a3c;border-radius:18px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;border:2px solid #2d1b5e;">
                    <div style="font-size:32px;">${r.emoji}</div>
                    <div style="flex:1;"><div style="font-weight:800;">${r.name}</div><div style="font-size:13px;color:#fbbf24;font-weight:700;">⭐ ${r.cost} 顆星</div></div>
                    <button onclick="startEdit('${r.id}')" class="btn-ghost" style="margin-right:4px;">編輯</button>
                    <button onclick="removeReward('${r.id}')" class="btn-ghost">移除</button>
                  </div>
                `).join("")}
              ` : ""}
            </div>
          ` : ""}
        </div>

        <!-- Toast -->
        ${s.toast ? `<div class="toast">${s.toast}</div>` : ""}

        <!-- Reason Modal -->
        ${s.modal ? (() => {
          const member = s.members[s.modal.memberId];
          if (!member) return "";
          const isAdd = s.modal.type === "add";
          const reasonList = isAdd ? ADD_REASONS : REMOVE_REASONS;
          return `
            <div onclick="state.modal=null;render()" style="position:fixed;inset:0;background:rgba(13,5,32,0.75);backdrop-filter:blur(4px);z-index:10001;display:flex;align-items:flex-end;justify-content:center;">
              <div onclick="event.stopPropagation()" style="width:100%;max-width:480px;background:linear-gradient(180deg,#1e0a3c,#12052a);border-top:3px solid ${isAdd?"#fbbf24":"#fb7185"};border-radius:28px 28px 0 0;padding:20px 20px 36px;animation:floatIn 0.25s ease;">
                <div style="width:40px;height:5px;border-radius:3px;background:#3b1f6a;margin:0 auto 16px;"></div>
                <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;">
                  <div style="font-size:34px;">${member.avatar}</div>
                  <div>
                    <div style="font-weight:900;font-size:17px;color:#f8f0ff;">${member.name}</div>
                    <div style="font-size:13px;font-weight:700;color:${isAdd?"#fbbf24":"#fb7185"};">${isAdd?"⭐ 為什麼要給星星？":"🔻 為什麼要扣星星？"}</div>
                  </div>
                </div>

                <!-- Amount -->
                <div style="margin-bottom:16px;">
                  <div style="font-size:12px;color:#6b46c1;font-weight:700;margin-bottom:8px;">幾顆星？</div>
                  <div style="display:flex;align-items:center;gap:10px;">
                    <button onclick="setAmount(${s.starAmount-1})" style="width:40px;height:40px;border-radius:12px;border:2px solid #3b1f6a;cursor:pointer;background:transparent;color:#a78bfa;font-size:20px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;">−</button>
                    <div style="display:flex;gap:6px;flex:1;justify-content:center;">
                      ${[1,3,5,10].map(n => `<button onclick="setAmount(${n})" style="min-width:44px;padding:8px 0;border-radius:12px;cursor:pointer;border:2px solid ${s.starAmount===n?(isAdd?"#fbbf24":"#fb7185"):"#2d1b5e"};background:${s.starAmount===n?(isAdd?"linear-gradient(135deg,#fbbf24,#f97316)":"linear-gradient(135deg,#fb7185,#e11d48)"):"#1a0a3c"};color:${s.starAmount===n?"#1a0a3c":"#6b46c1"};font-weight:900;font-size:15px;font-family:Nunito,sans-serif;">${n}</button>`).join("")}
                    </div>
                    <button onclick="setAmount(${s.starAmount+1})" style="width:40px;height:40px;border-radius:12px;border:2px solid #3b1f6a;cursor:pointer;background:transparent;color:#a78bfa;font-size:20px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;">+</button>
                  </div>
                </div>

                <!-- Reasons -->
                <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;">
                  ${reasonList.map(r => `<button onclick="confirmChange('${r}')" style="padding:10px 16px;border-radius:14px;border:2px solid ${isAdd?"#7c3aed":"#4c1d95"};background:${isAdd?"linear-gradient(135deg,#3b1f6a,#4c1d95)":"#2d1260"};color:#f8f0ff;font-weight:700;font-size:14px;cursor:pointer;font-family:Nunito,sans-serif;">${r}</button>`).join("")}
                </div>

                <!-- Custom -->
                <div style="display:flex;gap:8px;">
                  <input id="customReasonInput" value="${s.customReason}" oninput="state.customReason=this.value" onkeydown="if(event.key==='Enter'&&state.customReason.trim())confirmChange(state.customReason.trim())" placeholder="自己輸入原因…" class="input-field" style="flex:1;" />
                  <button onclick="if(state.customReason.trim())confirmChange(state.customReason.trim())" style="padding:0 20px;border-radius:16px;border:none;background:${isAdd?"linear-gradient(135deg,#fbbf24,#f97316)":"linear-gradient(135deg,#fb7185,#e11d48)"};color:#1a0a3c;font-weight:900;font-size:14px;cursor:pointer;font-family:Nunito,sans-serif;">確認</button>
                </div>
                <button onclick="state.modal=null;render()" style="width:100%;margin-top:12px;padding:10px 0;border-radius:14px;border:none;background:transparent;color:#6b46c1;font-weight:700;font-size:13px;cursor:pointer;font-family:Nunito,sans-serif;">取消</button>
              </div>
            </div>
          `;
        })() : ""}
      `;
    }

    // ── Global handlers ──
    window.setTab = t => { state.tab = t; render(); };
    window.setManageSection = s => { state.manageSection = s; render(); };
    window.openModal = (id, type) => openModal(id, type);
    window.confirmChange = r => confirmChange(r);
    window.redeemReward = (mId, rId) => redeemReward(mId, rId);
    window.addMember = () => addMember();
    window.removeMember = id => removeMember(id);
    window.addReward = () => addReward();
    window.removeReward = id => removeReward(id);
    window.saveEditReward = () => saveEditReward();
    window.startEdit = id => { state.editingReward = { ...state.rewards[id], id }; render(); };
    window.setEditEmoji = e => { if (state.editingReward) { state.editingReward.emoji = e; render(); } };
    window.selectAvatar = a => { state.newAvatar = a; render(); };
    window.selectRewardEmoji = e => { state.newRewardEmoji = e; render(); };
    window.setAmount = n => { state.starAmount = Math.max(1, n); render(); };

    render();
  </script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: #0d0520; color: #f8f0ff; min-height: 100vh; }

    @keyframes burst {
      0% { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes floatIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    .fade-in { animation: floatIn 0.3s ease; }
    #burst-container { position: fixed; inset: 0; pointer-events: none; z-index: 9999; }

    .badge { background: #1e0a3c; border: 2px solid #4c1d95; border-radius: 20px; padding: 6px 14px; font-size: 13px; font-weight: 800; color: #c4b5fd; }
    .tab-btn { flex: 1; padding: 10px 0; border-radius: 14px; border: none; cursor: pointer; font-weight: 800; font-size: 13px; font-family: Nunito, sans-serif; background: transparent; color: #6b46c1; transition: all 0.2s; }
    .tab-active { background: linear-gradient(135deg, #7c3aed, #a855f7) !important; color: #fff !important; box-shadow: 0 4px 16px rgba(124,58,237,0.4); }
    .sub-tab { flex: 1; padding: 8px 0; border-radius: 12px; border: none; cursor: pointer; font-weight: 800; font-size: 14px; font-family: Nunito, sans-serif; background: transparent; color: #6b46c1; transition: all 0.2s; }
    .sub-active { background: linear-gradient(135deg, #7c3aed, #a855f7) !important; color: #fff !important; }

    .member-card { border-radius: 24px; padding: 18px 20px; margin-bottom: 12px; display: flex; align-items: center; gap: 14px; }
    .star-btn { width: 40px; height: 40px; border-radius: 14px; border: none; cursor: pointer; background: linear-gradient(135deg, #fbbf24, #f97316); font-size: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(251,191,36,0.4); animation: pulse 1.5s ease-in-out infinite; }
    .minus-btn { width: 40px; height: 40px; border-radius: 14px; border: 2px solid #3b1f6a; cursor: pointer; background: transparent; color: #4c1d95; font-size: 18px; font-weight: 900; display: flex; align-items: center; justify-content: center; }

    .input-field { padding: 12px 16px; border-radius: 16px; border: 3px solid #3b1f6a; background: #2d1b5e; color: #f8f0ff; font-size: 15px; font-family: Nunito, sans-serif; outline: none; }
    .input-field:focus { border-color: #a855f7; }
    .btn-primary { padding: 12px 18px; border-radius: 16px; border: none; cursor: pointer; background: linear-gradient(135deg, #7c3aed, #a855f7); color: #fff; font-weight: 900; font-size: 15px; font-family: Nunito, sans-serif; box-shadow: 0 4px 12px rgba(124,58,237,0.4); white-space: nowrap; }
    .btn-ghost { padding: 7px 14px; border-radius: 10px; border: 2px solid #3b1f6a; cursor: pointer; background: transparent; color: #6b46c1; font-weight: 700; font-size: 13px; font-family: Nunito, sans-serif; }

    .toast { position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #7c3aed, #f472b6); color: #fff; padding: 12px 28px; border-radius: 50px; font-weight: 900; font-size: 15px; z-index: 10000; white-space: nowrap; box-shadow: 0 8px 32px rgba(124,58,237,0.5); animation: floatIn 0.3s ease; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1a0a2e; }
    ::-webkit-scrollbar-thumb { background: #4c1d95; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="burst-container"></div>
  <div id="root"></div>
</body>
</html>
